schema_version: 1

context:
  name: zeo
  version: "6.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: e29c52eb9767d94b270bff4c6eca4c863fcbc46d15323686e6fb71bfe43c7899

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - zeopack = ZEO.scripts.zeopack:main
      - runzeo = ZEO.runzeo:main
      - zeoctl = ZEO.zeoctl:main
      - zeo-nagios = ZEO.nagios:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools <80
  run:
    - python >=${{ python_min }}
    - zodb >=5.1.1
    - transaction >=2.0.3
    - persistent >=4.1.0
    - zc.lockfile
    - zconfig
    - zdaemon
    - zope.interface
    - setuptools <80

tests:
  - python:
      imports:
        - ZEO
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - runzeo --help
      - zeoctl --help
      - zeo-nagios --help

about:
  license_file: LICENSE.txt
  license: ZPL-2.1
  summary: ZEO - Single-server client-server database server for ZODB
  homepage: https://github.com/zopefoundation/ZEO
  repository: https://github.com/zopefoundation/ZEO
  documentation: https://github.com/zopefoundation/ZEO

extra:
  recipe-maintainers:
    - jan-janssen
